name: Deploy Node.js Backend

on:
  push:
    branches: [ "main" ]

permissions:
  id-token: write
  contents: read

env:
  # This tells GitHub to use the modern Node 24 runner for actions
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 'Login to Azure'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Using Node 22 (LTS) or '24' for the latest
          cache: 'npm'
          # If your package.json is NOT in the root, uncomment the line below:
          # cache-dependency-path: backend/package-lock.json 

      - name: Install dependencies
        # If your code is in a subfolder, add 'cd foldername &&' before npm install
        run: npm install

      - name: 'Deploy to Azure App Service'
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'your-azure-app-name'
          package: . # Change to 'backend' if your code is in a subfolder